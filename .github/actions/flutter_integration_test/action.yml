name: Flutter Integration Test
description: Run integration tests for AppFlowy

inputs:
  test_path:
    description: "The path to the integration test file"
    required: true
  flutter_version:
    description: "The version of Flutter to use"
    required: true
  rust_toolchain:
    description: "The version of Rust to use"
    required: true
  cargo_make_version:
    description: "The version of cargo-make to use"
    required: true
  rust_target:
    description: "The target to build for"
    required: true

runs:
  using: "composite"

  steps:
    - name: Install Rust toolchain
      id: rust_toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ inputs.rust_toolchain }}
        target: ${{ inputs.rust_target }}
        override: true
        profile: minimal

    - name: Install flutter
      id: flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ inputs.flutter_version }}
        cache: true

    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-make@${{ inputs.cargo_make_version }}

    - name: Install prerequisites
      working-directory: frontend
      run: |
        sudo wget -qO /etc/apt/trusted.gpg.d/dart_linux_signing_key.asc https://dl-ssl.google.com/linux/linux_signing_key.pub
        sudo wget -qO /etc/apt/sources.list.d/dart_stable.list https://storage.googleapis.com/download.dartlang.org/linux/debian/dart_stable.list
        sudo apt-get update
        sudo apt-get install -y dart curl build-essential libssl-dev clang cmake ninja-build pkg-config libgtk-3-dev keybinder-3.0 libnotify-dev network-manager libcurl4-openssl-dev libmpv-dev mpv libepoxy-dev
      shell: bash

    - name: Enable Flutter Desktop
      run: |
        flutter config --enable-linux-desktop
      shell: bash

    - uses: actions/download-artifact@v4
      with:
        name: ${{ github.run_id }}-ubuntu-latest

    - name: Uncompressed appflowy_flutter
      run: tar -xf appflowy_flutter.tar.gz
      shell: bash

    - name: Inspect media_kit native plugin
      working-directory: frontend/appflowy_flutter
      run: |
        find build/linux -name 'libmedia_kit_video_plugin.so' -print -exec ldd {} \; || true
        pkg-config --modversion mpv || true
        pkg-config --modversion epoxy || true
      shell: bash

    - name: Prepare PDFium for Linux integration tests
      run: |
        set -euo pipefail
        PDFIUM_DIR="$RUNNER_TEMP/pdfium"
        PDFIUM_ARCHIVE="$RUNNER_TEMP/pdfium-linux-x64.tgz"
        mkdir -p "$PDFIUM_DIR"
        curl -L \
          "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7811/pdfium-linux-x64.tgz" \
          -o "$PDFIUM_ARCHIVE"
        tar -xzf "$PDFIUM_ARCHIVE" -C "$PDFIUM_DIR" lib/libpdfium.so
        echo "APPFLOWY_PDFIUM_MODULE_PATH=$PDFIUM_DIR/lib/libpdfium.so" >> "$GITHUB_ENV"
        ls -lh "$PDFIUM_DIR/lib/libpdfium.so"
      shell: bash

    - name: Run Flutter integration tests
      working-directory: frontend/appflowy_flutter
      run: |
        flutter pub get
        dart run pdfrx:remove_wasm_modules
        trap 'dart run pdfrx:remove_wasm_modules --revert' EXIT
        export DISPLAY=:99
        sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
        sudo apt-get install network-manager
        set +eo pipefail
        flutter test ${{ inputs.test_path }} -d Linux --coverage > /tmp/test_output.txt 2>&1
        TEST_EXIT=$?
        set -eo pipefail

        cat /tmp/test_output.txt

        if [ "$TEST_EXIT" -ne 0 ] &&
          grep -Eq '🎉 [0-9]+ tests passed(, [0-9]+ skipped)?\.' /tmp/test_output.txt &&
          grep -q 'unhandled error during finalization of test' /tmp/test_output.txt &&
          grep -q 'PathNotFoundException: Deletion failed.*flutter_test_listener' /tmp/test_output.txt &&
          ! grep -q '❌.*(failed)' /tmp/test_output.txt; then
          echo "::warning::Ignoring Flutter test listener cleanup failure after all tests passed"
          TEST_EXIT=0
        fi

        exit "$TEST_EXIT"
      shell: bash
