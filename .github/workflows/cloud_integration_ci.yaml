name: AppFlowy-Cloud Integration Tests

on:
  repository_dispatch:
    types: [cloud-premium-integration-ci]
  workflow_dispatch:
    inputs:
      pr_ref:
        description: Branch or commit to test (e.g. refs/pull/123/head)
        required: true
        type: string
      pr_number:
        description: PR number (optional, for concurrency grouping)
        required: false
        type: string
      execution_id:
        description: Execution identifier (optional, forwarded to webhook)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.pr_number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

env:
  LOCALHOST_URL: http://localhost
  LOCALHOST_WS: ws://localhost/ws/v1
  LOCALHOST_WS_V2: ws://localhost/ws/v2
  # Root MCP integration tests run on the Actions runner and call the
  # standalone appflowy_mcp service exposed by docker-compose-ci.yml.
  APPFLOWY_MCP_TEST_BASE_URL: http://localhost:8002
  APPFLOWY_REDIS_URI: redis://redis:6379
  APPFLOWY_AI_REDIS_URL: redis://redis:6379
  LOCALHOST_GOTRUE: http://localhost/gotrue
  POSTGRES_PASSWORD: password
  DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
  SQLX_OFFLINE: true
  RUST_TOOLCHAIN: "1.92.0"
  # Speed up crate downloads with sparse registry
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  # Faster for git dependencies
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  # Disable incremental compilation in CI (faster clean builds)
  CARGO_INCREMENTAL: "0"

jobs:
  build_cloud:
    name: Build appflowy_cloud Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          ref: ${{ github.event.client_payload.pr_ref || inputs.pr_ref }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af || true
          docker image prune -af || true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Prepare env for Docker build
        run: cp deploy.env .env

      - name: Build Docker Image (cached)
        uses: docker/bake-action@v5
        with:
          files: docker-compose-ci.yml
          targets: appflowy_cloud
          load: true
          set: |
            *.platform=linux/amd64
            *.cache-from=type=gha,scope=cloud-integration-cloud
            *.cache-to=type=gha,scope=cloud-integration-cloud,mode=max
            *.args.BUILDKIT_INLINE_CACHE=1
            *.args.BUILDKIT_MULTI_PLATFORM=0
            *.args.PROFILE=debug
            *.args.APP_VERSION=0.9.999
            *.args.FEATURES=test-mailer

      - name: Save Docker Image
        run: docker save appflowyinc/appflowy_cloud_premium:latest-amd64 | gzip > appflowy_cloud.tar.gz

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-cloud
          path: appflowy_cloud.tar.gz
          retention-days: 1

  build_worker:
    name: Build appflowy_worker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          ref: ${{ github.event.client_payload.pr_ref || inputs.pr_ref }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af || true
          docker image prune -af || true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Prepare env for Docker build
        run: cp deploy.env .env

      - name: Build Docker Image (cached)
        uses: docker/bake-action@v5
        with:
          files: docker-compose-ci.yml
          targets: appflowy_worker
          load: true
          set: |
            *.platform=linux/amd64
            *.cache-from=type=gha,scope=cloud-integration-worker
            *.cache-to=type=gha,scope=cloud-integration-worker,mode=max
            *.args.BUILDKIT_INLINE_CACHE=1
            *.args.BUILDKIT_MULTI_PLATFORM=0
            *.args.PROFILE=debug
            *.args.APP_VERSION=0.9.999

      - name: Save Docker Image
        run: docker save appflowyinc/appflowy_worker_premium:latest-amd64 | gzip > appflowy_worker.tar.gz

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-worker
          path: appflowy_worker.tar.gz
          retention-days: 1

  build_search:
    name: Build appflowy_search Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          ref: ${{ github.event.client_payload.pr_ref || inputs.pr_ref }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af || true
          docker image prune -af || true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Prepare env for Docker build
        run: cp deploy.env .env

      - name: Build Docker Image (cached)
        uses: docker/bake-action@v5
        with:
          files: docker-compose-ci.yml
          targets: appflowy_search
          load: true
          set: |
            *.platform=linux/amd64
            *.cache-from=type=gha,scope=cloud-integration-search
            *.cache-to=type=gha,scope=cloud-integration-search,mode=max
            *.args.BUILDKIT_INLINE_CACHE=1
            *.args.BUILDKIT_MULTI_PLATFORM=0
            *.args.PROFILE=debug
            *.args.APP_VERSION=0.9.999

      - name: Save Docker Image
        run: docker save appflowyinc/appflowy_search_premium:latest-amd64 | gzip > appflowy_search.tar.gz

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-search
          path: appflowy_search.tar.gz
          retention-days: 1

  build_mcp:
    name: Build appflowy_mcp Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          ref: ${{ github.event.client_payload.pr_ref || inputs.pr_ref }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker builder prune -af || true
          docker image prune -af || true

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Prepare env for Docker build
        run: cp deploy.env .env

      - name: Build Docker Image (cached)
        uses: docker/bake-action@v5
        with:
          files: docker-compose-ci.yml
          targets: appflowy_mcp
          load: true
          set: |
            *.platform=linux/amd64
            *.cache-from=type=gha,scope=cloud-integration-mcp
            *.cache-to=type=gha,scope=cloud-integration-mcp,mode=max
            *.args.BUILDKIT_INLINE_CACHE=1
            *.args.BUILDKIT_MULTI_PLATFORM=0
            *.args.PROFILE=debug
            *.args.APP_VERSION=0.9.999

      - name: Save Docker Image
        run: docker save appflowyinc/appflowy_mcp_premium:latest-amd64 | gzip > appflowy_mcp.tar.gz

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-mcp
          path: appflowy_mcp.tar.gz
          retention-days: 1

  test:
    name: Integration Tests (${{ matrix.test_service }})
    runs-on: ubuntu-latest
    needs: [build_cloud, build_worker, build_search, build_mcp]
    timeout-minutes: 60
    env:
      MINIO_DATA_DIR: /tmp/minio-data
    strategy:
      fail-fast: false
      matrix:
        include:
          # Root crate unit tests from src/**. Keep this separate from integration
          # filters so split integration suites cannot accidentally drop unit coverage.
          - test_service: "appflowy_cloud_root_unit"
            test_modules: ""
          # Heavy workspace integration tests are split by Rust module path.
          # Each matrix entry still runs tests serially inside one Docker stack,
          # but independent suites can run in parallel across GitHub runners.
          - test_service: "appflowy_cloud_workspace_core"
            test_modules: >-
              workspace::access_request
              workspace::admin_copy_workspace_test
              workspace::admin_invitation_search_test
              workspace::admin_permissions_test
              workspace::admin_transfer_ownership_test
              workspace::csv_import_test
              workspace::database_listing_test
              workspace::default_user_workspace
              workspace::edit_workspace_test
              workspace::export_workspace_test
              workspace::folder_notification_test
              workspace::folder_projection_test
              workspace::folder_traversal_test
              workspace::inline_comment
              workspace::invitation_crud_test
              workspace::join_workspace_test
              workspace::member_crud_test
              workspace::mention_incremental_cache_test
              workspace::mention_person_test
              workspace::nango_integration_test
              workspace::pdf_export_test
              workspace::quick_note_test
              workspace::template_test
              workspace::workspace_crud_test
              workspace::workspace_folder_test
              workspace::workspace_import_test
              workspace::workspace_reorder_test
              workspace::workspace_settings_test
          - test_service: "appflowy_cloud_workspace_notifications"
            test_modules: >-
              workspace::notification_etag_test
              workspace::notification_events_test
              workspace::notification_inbox_test
              workspace::throttle_test
          - test_service: "appflowy_cloud_workspace_permissions"
            test_modules: "workspace::permissions"
          - test_service: "appflowy_cloud_workspace_import"
            test_modules: >-
              workspace::notion_import
              workspace::notion_import_test
          - test_service: "appflowy_cloud_workspace_publish"
            test_modules: >-
              workspace::page_view
              workspace::publish
              workspace::published_data_test
          - test_service: "appflowy_cloud_database_file_yrs"
            test_modules: "database file_test yrs_test"
          - test_service: "appflowy_cloud_misc"
            test_modules: "cache_validation folder_test mcp mention_api"
          - test_service: "appflowy_cloud_collab"
            test_modules: "collab"
          - test_service: "appflowy_cloud_ai"
            test_modules: "ai_test"
          - test_service: "appflowy_cloud_auth_user"
            test_modules: "gotrue user"
          - test_service: "appflowy_cloud_redis_info"
            test_modules: "redis_test server_info"
          - test_service: "appflowy_cloud_sql_core"
            test_modules: >-
              sql_test::admin_guest_status_test
              sql_test::admin_user_test
              sql_test::chat_test
              sql_test::guest_limit_test
              sql_test::permission_mapping_test
              sql_test::spam_signal_test
              sql_test::spam_test
              sql_test::user_test
          - test_service: "appflowy_cloud_sql_collab"
            test_modules: >-
              sql_test::collab_db_ops_test
              sql_test::collab_embed_test
              sql_test::collab_history_graph_test
              sql_test::collab_restore_state_test
              sql_test::pg_direct_write_test
          - test_service: "appflowy_cloud_sql_workspace"
            test_modules: >-
              sql_test::folder_db_ops_test
              sql_test::folder_read_test
              sql_test::guest_workspace_test
              sql_test::publish_blob_ref_test
              sql_test::publish_test
              sql_test::s3_cleanup_test
              sql_test::workspace_database_backfill_test
              sql_test::workspace_database_listing_test
              sql_test::workspace_database_sync_test
              sql_test::workspace_test
          - test_service: "appflowy_cloud_member_packages"
            test_modules: ""
          # Group 3: Search tests (dedicated docker instance for stable indexing)
          - test_service: "appflowy_cloud_search"
            test_modules: "search"
          # Group 4: Whitelist tests (isolated — these toggle GoTrue global state)
          - test_service: "appflowy_cloud_whitelist"
            test_modules: >-
              sql_test::whitelist_test
              user::admin_signup_whitelist_test
              user::sign_up
              workspace::admin_system_config_test
          # Group 5: SCIM directory-sync end-to-end (drives the real Authentik IdP
          # from docker-compose-ci.yml). The cloud image is the default build, so
          # SCIM is available with no seat limit and no license.
          - test_service: "appflowy_cloud_scim"
            test_modules: "scim"
          - test_service: "appflowy_search_package"
            test_modules: ""
          - test_service: "appflowy_worker"
            test_modules: ""
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          ref: ${{ github.event.client_payload.pr_ref || inputs.pr_ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.6
        continue-on-error: true

      - name: Configure sccache
        if: steps.sccache.outcome == 'success'
        run: |
          echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
          sccache --stop-server 2>/dev/null || true
          export SCCACHE_GHA_ENABLED=true
          export RUSTC_WRAPPER=
          if timeout 10 sccache --start-server 2>&1 && timeout 5 sccache --show-stats 2>&1; then
            echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "sccache is available and configured"
          else
            sccache --stop-server 2>/dev/null || true
            echo "sccache unavailable, proceeding without it"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          shared-key: cloud-integration
          cache-all-crates: true

      - name: Free disk space on runner
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          docker builder prune -af || true
          docker image prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Download Docker Images
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker Images
        run: |
          set -euo pipefail
          ls -lh appflowy_*.tar.gz
          gunzip -c appflowy_cloud.tar.gz | docker load
          gunzip -c appflowy_worker.tar.gz | docker load
          gunzip -c appflowy_search.tar.gz | docker load
          gunzip -c appflowy_mcp.tar.gz | docker load
          echo "==> Loaded images:"
          docker images --format '{{.Repository}}:{{.Tag}} {{.Size}}' | grep appflowy || true

      - name: Remove downloaded image archives
        run: rm -f appflowy_cloud.tar.gz appflowy_worker.tar.gz appflowy_search.tar.gz appflowy_mcp.tar.gz

      - name: Copy and rename deploy.env to .env
        run: cp deploy.env .env

      - name: Replace values in .env
        run: |
          # log level
          # appflowy_search + search targets included so the search service's
          # startup decisions (S3 bootstrap, worker spawn/skip reasons) appear
          # in the "Show appflowy_search startup logs" step — without them a
          # skipped ensure worker is invisible and search test failures look
          # like flaky timeouts.
          sed -i 's|RUST_LOG=.*|RUST_LOG='appflowy_cloud=info,appflowy_worker=debug,appflowy_collaborate=info,indexer=info,appflowy_search=info,search=info'|' .env
          sed -i 's|GOTRUE_SMTP_USER=.*|GOTRUE_SMTP_USER=${{ secrets.CI_GOTRUE_SMTP_USER }}|' .env
          sed -i 's|GOTRUE_SMTP_PASS=.*|GOTRUE_SMTP_PASS=${{ secrets.CI_GOTRUE_SMTP_PASS }}|' .env
          sed -i 's|GOTRUE_SMTP_ADMIN_EMAIL=.*|GOTRUE_SMTP_ADMIN_EMAIL=${{ secrets.CI_GOTRUE_SMTP_ADMIN_EMAIL }}|' .env
          sed -i 's|GOTRUE_EXTERNAL_GOOGLE_ENABLED=.*|GOTRUE_EXTERNAL_GOOGLE_ENABLED=true|' .env
          sed -i 's|GOTRUE_MAILER_AUTOCONFIRM=.*|GOTRUE_MAILER_AUTOCONFIRM=false|' .env
          sed -i 's|API_EXTERNAL_URL=http://your-host/gotrue|API_EXTERNAL_URL=http://localhost/gotrue|' .env
          sed -i 's|GOTRUE_RATE_LIMIT_EMAIL_SENT=100|GOTRUE_RATE_LIMIT_EMAIL_SENT=1000|' .env
          sed -i 's|APPFLOWY_MAILER_SMTP_USERNAME=.*|APPFLOWY_MAILER_SMTP_USERNAME=${{ secrets.CI_GOTRUE_SMTP_USER }}|' .env
          sed -i 's|APPFLOWY_MAILER_SMTP_PASSWORD=.*|APPFLOWY_MAILER_SMTP_PASSWORD=${{ secrets.CI_GOTRUE_SMTP_PASS }}|' .env
          # Route outbound appflowy_cloud mail to the mailpit sidecar so the
          # email_delivery_* tests can assert delivery. The override only
          # activates because the image is built with `--features test-mailer`
          # above; release builds ignore these vars. `mailpit` is the service
          # name on the shared docker-compose network.
          echo 'APPFLOWY_MAILER_TEST_MODE=true' >> .env
          echo 'APPFLOWY_MAILER_TEST_SMTP_HOST=mailpit' >> .env
          echo 'APPFLOWY_MAILER_TEST_SMTP_PORT=1025' >> .env

          sed -i 's|AI_OPENAI_API_KEY=.*|AI_OPENAI_API_KEY=${{ secrets.CI_OPENAI_API_KEY }}|' .env
          sed -i 's|AI_OPENAI_API_SUMMARY_MODEL=.*|AI_OPENAI_API_SUMMARY_MODEL="gpt-4o-mini"|' .env
          sed -i 's|APPFLOWY_EMBEDDING_CHUNK_SIZE=.*|APPFLOWY_EMBEDDING_CHUNK_SIZE=500|' .env
          sed -i 's|APPFLOWY_EMBEDDING_CHUNK_OVERLAP=.*|APPFLOWY_EMBEDDING_CHUNK_OVERLAP=50|' .env
          sed -i 's|ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.CI_AI_ANTHROPIC_API_KEY }}|' .env
          sed -i 's|AI_APPFLOWY_HOST=.*|AI_APPFLOWY_HOST=http://localhost|' .env
          sed -i 's|^#* *ASSEMBLYAI_API_KEY=.*|ASSEMBLYAI_API_KEY=${{ secrets.CI_ASSEMBLYAI_API_KEY }}|' .env

          sed -i 's|APPFLOWY_WEB_URL=.*|APPFLOWY_WEB_URL=http://localhost:3000|' .env
          sed -i 's|.*APPFLOWY_S3_PRESIGNED_URL_ENDPOINT=.*|APPFLOWY_S3_PRESIGNED_URL_ENDPOINT=http://localhost/minio-api|' .env
          sed -i 's|APPFLOWY_SPAM_USER_DETECT_THRESHOLD=.*|APPFLOWY_SPAM_USER_DETECT_THRESHOLD=1|' .env
          sed -i 's|APPFLOWY_DATABASE_BLOB_APPEND_FLUSH_INTERVAL_MS=.*|APPFLOWY_DATABASE_BLOB_APPEND_FLUSH_INTERVAL_MS=500|' .env

          echo '' >> .env
          echo 'APPFLOWY_KEYWORD_SEARCH_ENABLED=true' >> .env
          echo 'APPFLOWY_KEYWORD_WORKER_TICK_INTERVAL=3' >> .env
          echo 'APPFLOWY_KEYWORD_INDEX_MAP_SIZE_BYTES=5242880' >> .env
          echo 'APPFLOWY_WORKSPACE_ACTOR_SNAPSHOT_INTERVAL_SECS=15' >> .env
          echo 'APPFLOWY_PAGE_HISTORY_ENABLE=true' >> .env
          echo 'APPFLOWY_FEATURE_RULES_DOMAIN=appflowy.io' >> .env
          echo 'APPFLOWY_INVITE_MIN_ACCOUNT_AGE_SECS=0' >> .env
          echo 'APPFLOWY_INVITE_MIN_WORKSPACE_AGE_SECS=0' >> .env
          echo 'APPFLOWY_INVITE_RATE_LIMIT_PER_HOUR=0' >> .env
          echo 'APPFLOWY_INVITE_RATE_LIMIT_PER_DAY=0' >> .env

          cat .env
        shell: bash

      - name: Update Nginx Configuration
        # the wasm-pack headless tests will run on random ports, so we need to allow all origins
        run: |
          sed -i 's/http:\/\/127\.0\.0\.1:8000/http:\/\/127.0.0.1/g' nginx/nginx.conf
          cat nginx/nginx.conf

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Run Docker-Compose
        timeout-minutes: 15
        run: |
          export APPFLOWY_WORKER_VERSION=latest-amd64
          export APPFLOWY_CLOUD_VERSION=latest-amd64
          export APPFLOWY_SEARCH_VERSION=latest-amd64
          export APPFLOWY_ADMIN_FRONTEND_VERSION=latest-amd64
          export APPFLOWY_AI_VERSION=0.9.59-amd64
          sudo rm -rf /tmp/minio-data || true
          echo "Starting services (using locally built images, pulling only missing ones)..."
          docker compose -f docker-compose-ci.yml up -d --pull=missing
          docker ps -a
          docker compose -f docker-compose-ci.yml logs pg_snapshot_unpack
          docker compose -f docker-compose-ci.yml logs appflowy_cloud

      - name: Show appflowy_search startup logs
        if: matrix.test_service == 'appflowy_cloud_search'
        run: docker compose -f docker-compose-ci.yml logs appflowy_search

      - name: Wait for appflowy cloud to be ready
        run: |
          echo "Waiting for services to be ready..."
          for i in {1..60}; do
            if curl -f http://localhost/api/health 2>/dev/null; then
              echo "Health check passed after $((i*5)) seconds"
              exit 0
            fi
            echo "Attempt $i: Health check failed, waiting 5 seconds..."
            sleep 5
          done
          echo "Health check timeout after 300 seconds - proceeding anyway"

      - name: Wait for MinIO to be ready
        run: |
          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/ready 2>/dev/null; then
              echo "MinIO ready after $((i*3)) seconds"
              break
            fi
            echo "Attempt $i: MinIO not ready, waiting 3 seconds..."
            sleep 3
          done

          # Verify bucket is accessible via S3 API
          echo "Verifying MinIO bucket access..."
          for i in {1..10}; do
            if docker compose -f docker-compose-ci.yml exec -T minio mc ls local/ 2>/dev/null; then
              echo "MinIO bucket listing succeeded"
              exit 0
            fi
            if curl -sf http://localhost:9000/appflowy/ 2>/dev/null; then
              echo "MinIO bucket accessible via HTTP"
              exit 0
            fi
            echo "Attempt $i: Bucket not accessible, waiting 3 seconds..."
            sleep 3
          done
          echo "::warning::MinIO bucket check did not confirm access - dumping MinIO logs"
          docker compose -f docker-compose-ci.yml logs minio

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Run Tests
        timeout-minutes: 50
        run: |
          set -e
          echo "Running tests for ${{ matrix.test_service }}"
          if [ "${{ matrix.test_service }}" = "appflowy_cloud_root_unit" ]; then
            echo "==> Testing appflowy-cloud root unit tests"
            RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
              --features ai-test-enabled,sync-v2 --lib --bins \
              -- --skip stress_test --skip commercial_test --skip whitelist --test-threads=1
          elif [ "${{ matrix.test_service }}" = "appflowy_search_package" ]; then
            echo "==> Testing appflowy-search package"
            RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
              -p appflowy-search -- --test-threads=1
          elif [ "${{ matrix.test_service }}" = "appflowy_cloud_member_packages" ]; then
            echo "==> Testing workspace member packages"
            RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
              -p appflowy-collaborate \
              -p pdf-exporter \
              -p collab \
              -p collab-rt-entity \
              -p appflowy-proto \
              -- --test-threads=1
          elif [ "${{ matrix.test_service }}" = "appflowy_worker" ]; then
            RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
              -p appflowy-worker -- --test-threads=1
          elif [ "${{ matrix.test_service }}" = "appflowy_cloud_whitelist" ]; then
            # Whitelist tests run in isolation — they toggle GoTrue global state.
            # `${module}::` makes the filter a Rust path prefix rather than a
            # substring, so e.g. `workspace::` matches tests in `tests/workspace/`
            # but not `mcp::tools_test::get_self_returns_workspace_id`.
            for module in ${{ matrix.test_modules }}; do
              echo "==> Testing module: ${module}"
              RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
                --features ai-test-enabled,sync-v2 "${module}::" \
                -- --skip stress_test --skip commercial_test --test-threads=1
            done
          elif [ "${{ matrix.test_service }}" = "appflowy_cloud_scim" ]; then
            # SCIM end-to-end against the real Authentik IdP (from docker-compose-ci.yml).
            # Authentik (in docker) reaches the cloud over the compose network; the
            # test (on the runner) reaches Authentik's health port and drives it via
            # `docker exec`. The cloud image is the default build, so SCIM is available
            # with no seat limit and no license.
            echo "==> SCIM directory-sync end-to-end (Authentik)"
            SCIM_URL_FOR_AUTHENTIK=http://appflowy_cloud:8000/scim/v2 \
            AUTHENTIK_HEALTH_URL=http://localhost:9010/-/health/ready/ \
            RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
              --features ai-test-enabled,sync-v2 "scim::" \
              -- --test-threads=1 --nocapture
          else
            # Run root crate integration tests module by module.
            # `${module}::` makes the filter a Rust path prefix rather than a
            # substring, so a module like `workspace` only matches tests under
            # `tests/workspace/` and not unrelated `mcp::*workspace*` or
            # `search::*workspace*` tests.
            # Skip whitelist tests — they run in the dedicated whitelist group.
            for module in ${{ matrix.test_modules }}; do
              echo "==> Testing module: ${module}"
              RUST_LOG="info" DISABLE_CI_TEST_LOG="true" cargo test --locked \
                --features ai-test-enabled,sync-v2 "${module}::" \
                -- --skip stress_test --skip commercial_test --skip whitelist --test-threads=1
            done
          fi

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Collect Docker logs
        if: failure()
        run: |
          docker ps -a > docker-ps-output.txt
          docker compose -f docker-compose-ci.yml logs appflowy_cloud > appflowy_cloud_logs.txt
          docker compose -f docker-compose-ci.yml logs appflowy_worker > appflowy_worker_logs.txt
          docker compose -f docker-compose-ci.yml logs appflowy_search > appflowy_search_logs.txt 2>&1 || true

      - name: Upload Logs as Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appflowy-cloud-logs-${{ matrix.test_service }}-${{ github.run_id }}
          path: |
            docker-ps-output.txt
            appflowy_cloud_logs.txt
            appflowy_worker_logs.txt
            appflowy_search_logs.txt
          retention-days: 1

  notify-webhook:
    name: Notify Webhook
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Send webhook notification
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          event-type: ci-result
          client-payload: |
            {
              "execution_id": "${{ github.event.client_payload.execution_id || inputs.execution_id || github.run_id }}",
              "workflow_type": "integration",
              "status": "${{ needs.test.result }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
