name: Mobile-CI

on:
  repository_dispatch:
    types: [private-repo-mobile-ci]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number from private repo'
        required: false
        type: string
      pr_ref:
        description: 'Git ref to checkout from private repo'
        required: false
        type: string
        default: 'main'
      workflow_id:
        description: "Codemagic workflow ID"
        required: true
        default: "ios-workflow"
        type: choice
        options:
          - ios-workflow
          - android-workflow

env:
  CODEMAGIC_API_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
  APP_ID: "6731d2f427e7c816080c3674"
  CLOUD_VERSION: latest-amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  setup-test-server:
    runs-on: ubuntu-latest
    env:
      MINIO_DATA_DIR: /tmp/minio-data
    steps:
      - name: Checkout AppFlowy-Cloud-Premium code
        uses: actions/checkout@v4
        with:
          repository: AppFlowy-IO/AppFlowy-Cloud-Premium
          token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          path: AppFlowy-Cloud-Premium

      - name: Prepare appflowy cloud env
        working-directory: AppFlowy-Cloud-Premium
        run: |
          cp deploy.env .env
          sed -i 's/GOTRUE_EXTERNAL_GOOGLE_ENABLED=.*/GOTRUE_EXTERNAL_GOOGLE_ENABLED=true/' .env
          sed -i 's|GOTRUE_MAILER_AUTOCONFIRM=.*|GOTRUE_MAILER_AUTOCONFIRM=true|' .env
          sed -i 's|API_EXTERNAL_URL=.*|API_EXTERNAL_URL=http://localhost|' .env
          sed -i 's|AI_OPENAI_API_KEY=.*|AI_OPENAI_API_KEY=${{ secrets.CI_OPENAI_API_KEY }}|' .env
          sed -i 's|APPFLOWY_SPAM_DETECT_ENABLED=.*|APPFLOWY_SPAM_DETECT_ENABLED=false|' .env
          sed -i 's|APPFLOWY_DATABASE_BLOB_APPEND_FLUSH_INTERVAL_MS=.*|APPFLOWY_DATABASE_BLOB_APPEND_FLUSH_INTERVAL_MS=500|' .env

          echo '' >> .env
          echo 'APPFLOWY_PAGE_HISTORY_ENABLE=true' >> .env

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Run Docker-Compose
        working-directory: AppFlowy-Cloud-Premium
        env:
          APPFLOWY_CLOUD_VERSION: ${{ env.CLOUD_VERSION }}
          APPFLOWY_HISTORY_VERSION: ${{ env.CLOUD_VERSION }}
          APPFLOWY_WORKER_VERSION: ${{ env.CLOUD_VERSION }}
          APPFLOWY_ADMIN_FRONTEND_VERSION: ${{ env.CLOUD_VERSION }}
        run: |
          echo "Cleaning up any existing containers..."
          docker compose -f docker-compose-ci.yml down -v --remove-orphans || true
          docker container prune -f || true
          docker volume prune -f || true
          sudo rm -rf /tmp/minio-data || true

          echo "Pulling and starting containers..."
          docker compose -f docker-compose-ci.yml pull
          docker compose -f docker-compose-ci.yml up -d
          docker ps -a
          docker compose -f docker-compose-ci.yml logs appflowy_cloud

      - name: Wait for appflowy cloud to be ready
        working-directory: AppFlowy-Cloud-Premium
        run: |
          echo "Waiting for services to be ready..."
          for i in {1..60}; do
            if curl -f http://localhost/api/health 2>/dev/null; then
              echo "Health check passed after $((i*5)) seconds"
              exit 0
            fi
            echo "Attempt $i: Health check failed, waiting 5 seconds..."
            sleep 5
          done
          echo "Health check timeout after 300 seconds - proceeding anyway"

      - name: Wait for MinIO to be ready
        working-directory: AppFlowy-Cloud-Premium
        run: |
          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/ready 2>/dev/null; then
              echo "MinIO ready after $((i*3)) seconds"
              break
            fi
            echo "Attempt $i: MinIO not ready, waiting 3 seconds..."
            sleep 3
          done

          # Verify bucket is accessible via S3 API
          echo "Verifying MinIO bucket access..."
          for i in {1..10}; do
            if docker compose -f docker-compose-ci.yml exec -T minio mc ls local/ 2>/dev/null; then
              echo "MinIO bucket listing succeeded"
              exit 0
            fi
            if curl -sf http://localhost:9000/appflowy/ 2>/dev/null; then
              echo "MinIO bucket accessible via HTTP"
              exit 0
            fi
            echo "Attempt $i: Bucket not accessible, waiting 3 seconds..."
            sleep 3
          done
          echo "::warning::MinIO bucket check did not confirm access - dumping MinIO logs"
          docker compose -f docker-compose-ci.yml logs minio

      - name: Collect Docker logs
        if: failure()
        run: |
          docker ps -a > docker-ps-output.txt
          docker logs appflowy-cloud-premium-appflowy_cloud-1 > appflowy_cloud_logs.txt 2>&1 || true
          docker logs appflowy-cloud-premium-minio-1 > minio_logs.txt 2>&1 || true

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ci-test-server-logs-${{ github.run_id }}
          path: |
            docker-ps-output.txt
            appflowy_cloud_logs.txt
            minio_logs.txt
          retention-days: 1

  trigger-mobile-build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine branch to build
        id: branch
        run: |
          # Use PR ref if available, otherwise use main
          BRANCH="${{ github.event.client_payload.pr_ref || github.event.inputs.pr_ref || 'main' }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Building branch: $BRANCH"

      - name: Determine workflow ID
        id: workflow
        run: |
          # Use input workflow_id if provided, otherwise default to ios-workflow
          WORKFLOW_ID="${{ github.event.inputs.workflow_id || 'ios-workflow' }}"
          echo "workflow_id=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "Using workflow: $WORKFLOW_ID"

      - name: Trigger Codemagic Build
        id: trigger_build
        run: |
          RESPONSE=$(curl -X POST \
            --header "Content-Type: application/json" \
            --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
            --data '{
              "appId": "${{ env.APP_ID }}",
              "workflowId": "${{ steps.workflow.outputs.workflow_id }}",
              "branch": "${{ steps.branch.outputs.branch }}"
            }' \
            https://api.codemagic.io/builds)

          BUILD_ID=$(echo $RESPONSE | jq -r '.buildId')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID"

      - name: Wait for build and check status
        id: check_status
        run: |
          while true; do
            curl -X GET \
              --header "Content-Type: application/json" \
              --header "x-auth-token: $CODEMAGIC_API_TOKEN" \
              https://api.codemagic.io/builds/${{ steps.trigger_build.outputs.build_id }} > /tmp/response.json

            RESPONSE_WITHOUT_COMMAND=$(cat /tmp/response.json | jq 'walk(if type == "object" and has("subactions") then .subactions |= map(del(.command)) else . end)')
            STATUS=$(echo $RESPONSE_WITHOUT_COMMAND | jq -r '.build.status')

            if [ "$STATUS" = "finished" ]; then
              SUCCESS=$(echo $RESPONSE_WITHOUT_COMMAND | jq -r '.success')
              BUILD_URL=$(echo $RESPONSE_WITHOUT_COMMAND | jq -r '.buildUrl')
              echo "status=$STATUS" >> $GITHUB_OUTPUT
              echo "success=$SUCCESS" >> $GITHUB_OUTPUT
              echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "failed" ]; then
              echo "status=failed" >> $GITHUB_OUTPUT
              break
            fi

            sleep 60
          done

      - name: Display Build Results
        run: |
          echo "Build Status: ${{ steps.check_status.outputs.status }}"
          echo "Build Success: ${{ steps.check_status.outputs.success }}"
          echo "Build URL: ${{ steps.check_status.outputs.build_url }}"
          echo "Branch: ${{ steps.branch.outputs.branch }}"
          echo "Workflow: ${{ steps.workflow.outputs.workflow_id }}"

      # Optional: Add Slack notification if you have the webhook configured
      # - name: Slack Notification
      #   uses: 8398a7/action-slack@v3
      #   if: always()
      #   with:
      #     status: ${{ steps.check_status.outputs.success == 'true' && 'success' || 'failure' }}
      #     fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      #     text: |
      #       Mobile CI Build Result (Triggered from Private Repo)
      #       Branch: ${{ steps.branch.outputs.branch }}
      #       Workflow: ${{ steps.workflow.outputs.workflow_id }}
      #       Build URL: ${{ steps.check_status.outputs.build_url }}
      #       PR: ${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || 'N/A' }}
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK }}